name: Deploy to nginx

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted  

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy static files
        run: |
          # Очищаем старые файлы и копируем новые
          rm -rf /var/www/html/*
          cp -r ./* /var/www/html/

      - name: Reload nginx
        run: sudo nginx -s reload